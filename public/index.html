<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morar Bem - Imobiliária</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #000;
      color: #fff;
      font-family: monospace;
      padding: 20px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    header {
      border-bottom: 1px solid #333;
      padding-bottom: 20px;
      margin-bottom: 30px;
    }
    h1 {
      font-size: 24px;
      font-weight: normal;
      letter-spacing: 2px;
    }
    .section {
      margin-bottom: 40px;
    }
    .section h2 {
      font-size: 16px;
      font-weight: normal;
      margin-bottom: 20px;
      border-left: 2px solid #fff;
      padding-left: 10px;
    }
    .imovel {
      border: 1px solid #333;
      padding: 15px;
      margin-bottom: 15px;
      background-color: #0a0a0a;
    }
    .imovel-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .imovel-id {
      font-weight: bold;
      font-size: 12px;
      color: #888;
    }
    .imovel-tipo {
      font-size: 14px;
      font-weight: bold;
    }
    .imovel-endereco {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 5px;
    }
    .imovel-preco {
      font-size: 14px;
      color: #00ff00;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .imovel-descricao {
      font-size: 12px;
      color: #999;
      margin-bottom: 15px;
      line-height: 1.4;
    }
    .form-interesse {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    input[type="tel"] {
      flex: 1;
      background-color: #111;
      border: 1px solid #333;
      color: #fff;
      padding: 8px;
      font-family: monospace;
      font-size: 12px;
    }
    input[type="tel"]:focus {
      outline: none;
      border-color: #fff;
    }
    button {
      background-color: #fff;
      color: #000;
      border: none;
      padding: 8px 15px;
      cursor: pointer;
      font-family: monospace;
      font-size: 12px;
      font-weight: bold;
    }
    button:hover {
      background-color: #ccc;
    }
    button:disabled {
      background-color: #666;
      cursor: not-allowed;
    }
    .msg {
      font-size: 11px;
      margin-top: 5px;
      min-height: 14px;
    }
    .msg.success {
      color: #00ff00;
    }
    .msg.error {
      color: #ff0000;
    }
    footer {
      border-top: 1px solid #333;
      padding-top: 20px;
      margin-top: 40px;
      font-size: 11px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>MORAR BEM</h1>
      <p style="font-size: 12px; color: #666; margin-top: 10px;">Imobiliária | Catálogo de Propriedades</p>
    </header>

    <div class="section">
      <h2>Disponíveis</h2>
      <div id="imoveis-list"></div>
    </div>

    <footer>
      <p>Imobiliária Morar Bem © 2024 | Todos os imóveis listados</p>
    </footer>
  </div>

  <script>
    const apiUrl = '/api';

    async function carregarImoveis() {
      try {
        const res = await fetch(`${apiUrl}/imoveis`);
        const imoveis = await res.json();
        renderizarImoveis(imoveis);
      } catch (err) {
        console.error('Erro ao carregar imóveis:', err);
        document.getElementById('imoveis-list').innerHTML = '<p style="color: #ff0000;">Erro ao carregar imóveis</p>';
      }
    }

    function renderizarImoveis(imoveis) {
      const container = document.getElementById('imoveis-list');
      container.innerHTML = imoveis.map(imovel => `
        <div class="imovel">
          <div class="imovel-header">
            <span class="imovel-tipo">${imovel.tipo}</span>
            <span class="imovel-id">ID: ${imovel.id}</span>
          </div>
          <div class="imovel-endereco">${imovel.endereco}, ${imovel.cidade}</div>
          <div class="imovel-preco">R$ ${parseFloat(imovel.preco).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</div>
          <div class="imovel-descricao">${imovel.descricao}</div>
          <div class="form-interesse">
            <input type="tel" class="telefone-input" placeholder="(99) 99999-9999" data-imovel="${imovel.id}">
            <button onclick="registrarInteresse(${imovel.id})">Interessado</button>
          </div>
          <div class="msg" id="msg-${imovel.id}"></div>
        </div>
      `).join('');
    }

    async function registrarInteresse(imovelId) {
      const telefoneInput = document.querySelector(`input[data-imovel="${imovelId}"]`);
      const telefone = telefoneInput.value.trim();
      const msgDiv = document.getElementById(`msg-${imovelId}`);

      if (!telefone) {
        msgDiv.textContent = 'Telefone obrigatório';
        msgDiv.className = 'msg error';
        return;
      }

      try {
        const res = await fetch(`${apiUrl}/leads`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ imovel_id: imovelId, telefone })
        });

        if (res.ok) {
          msgDiv.textContent = 'Interesse registrado';
          msgDiv.className = 'msg success';
          telefoneInput.value = '';
          setTimeout(() => msgDiv.textContent = '', 3000);
        } else {
          msgDiv.textContent = 'Erro ao registrar';
          msgDiv.className = 'msg error';
        }
      } catch (err) {
        msgDiv.textContent = 'Erro na conexão';
        msgDiv.className = 'msg error';
      }
    }

    carregarImoveis();
  </script>
</body>
</html>
